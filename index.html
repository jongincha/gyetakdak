<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>계탉닭</title>
  <style>
    :root {
      --hero-overlay: rgba(10, 12, 10, 0.35);
      --text-on-hero: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
        "Pretendard Variable", Pretendard, "Malgun Gothic", sans-serif;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 480px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero__video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .hero__overlay {
      position: absolute;
      inset: 0;
      background: var(--hero-overlay);
    }

    .hero__content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: var(--text-on-hero);
      padding: 0 24px;
    }

    .hero__title {
      margin: 0 0 12px;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      text-wrap: balance;
    }

    .hero__subtitle {
      margin: 0;
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: rgba(255, 255, 255, 0.9);
    }

    /* 모션에 민감한 사용자를 위해 자동재생 비디오 대신 정지된 배경으로 대체 */
    @media (prefers-reduced-motion: reduce) {
      .hero__video {
        display: none;
      }
      .hero {
        background: #111;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <!-- poster="여기에 로딩 중 보여줄 정지 이미지 URL(선택)" 을 추가하면 첫 프레임이 뜨기 전 깜빡임을 줄일 수 있습니다 -->
    <video
      class="hero__video"
      autoplay
      muted
      loop
      playsinline
      aria-hidden="true"
    >
      <source
        src="https://res.cloudinary.com/hb5bdcuw/video/upload/v1784575118/center04_1_dvga4u.mp4"
        type="video/mp4"
      />
    </video>
    <div class="hero__overlay"></div>

    <div class="hero__content">
      <h1 class="hero__title">계탉닭</h1>
      <p class="hero__subtitle">여기에 한 줄 소개 문구를 넣어주세요</p>
    </div>
  </header>

  <main>
    <!-- 다음 섹션 콘텐츠 -->
  </main>
</body>
</html>
